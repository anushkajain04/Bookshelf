<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BookShelf — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/auth.css"/>
</head>
<body>
<div class="page">

  <aside class="panel-left" aria-hidden="true">
    <div class="spines-wrap" id="spinesWrap"></div>
    <div class="shelf-bar"></div>
    <figure class="shelf-quote">
      <blockquote>"A reader lives a thousand lives before he dies. The man who never reads lives only one."</blockquote>
      <figcaption>— George R.R. Martin</figcaption>
    </figure>
  </aside>

  <main class="panel-right">
    <div class="form-shell">

      <a href="/" class="logo">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="8" fill="#1a1410"/>
          <rect x="8"  y="8" width="8"  height="24" rx="2" fill="#c8793a"/>
          <rect x="18" y="8" width="6"  height="24" rx="2" fill="#e8d9c0" opacity=".9"/>
          <rect x="26" y="8" width="5"  height="24" rx="2" fill="#c8793a" opacity=".5"/>
        </svg>
        <span class="logo-text">Book<em>Shelf</em></span>
      </a>

      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to continue your reading journey.</p>

      <div class="alert hidden" id="alertBox" role="alert" aria-live="polite">
        <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="alertMsg"></span>
      </div>

      <form id="loginForm" novalidate>

        <div class="field">
          <label for="email">Email address</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required/>
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">
              <svg id="iconEyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="iconEyeOff" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="row-between">
          <label class="check-label">
            <input type="checkbox" id="remember" name="remember"/>
            <span class="check-box"></span>
            Remember me
          </label>
          <a href="forgot.html" class="link-amber">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          <span class="btn-spinner"></span>
          <span class="btn-label">Sign in</span>
        </button>

        <div class="divider"><span>or</span></div>
        <p class="signup-row">Don't have an account? <a href="register.html" class="link-amber">Create one free</a></p>
      </form>

    </div>
  </main>
</div>

<script>
(function buildSpines() {
  const wrap = document.getElementById('spinesWrap');
  if (!wrap) return;
  const colors  = ['#c8793a','#e8d9c0','#5a7a5c','#8b5e3c','#4a6a8a','#b8a06e','#7a5a8a','#3a6a5a'];
  const heights = [130,165,145,185,135,158,148,172,128,162];
  const widths  = [22,18,26,20,16,24,19,23];
  for (let i = 0; i < 28; i++) {
    const s = document.createElement('div');
    s.className = 'spine';
    s.style.cssText = `width:${widths[i%widths.length]}px;height:${heights[i%heights.length]}px;background:${colors[i%colors.length]};animation-delay:${(i*0.03).toFixed(2)}s`;
    wrap.appendChild(s);
  }
})();

const form      = document.getElementById('loginForm');
const emailEl   = document.getElementById('email');
const passwordEl= document.getElementById('password');
const rememberEl= document.getElementById('remember');
const submitBtn = document.getElementById('submitBtn');
const emailErr  = document.getElementById('emailError');
const passErr   = document.getElementById('passwordError');
const alertBox  = document.getElementById('alertBox');
const alertMsg  = document.getElementById('alertMsg');

function showAlert(msg, type) { alertBox.className = 'alert ' + type; alertMsg.textContent = msg; }
function hideAlert()          { alertBox.className = 'alert hidden'; }

// Eye toggle
document.getElementById('togglePw').addEventListener('click', function() {
  const showing = passwordEl.type === 'text';
  passwordEl.type = showing ? 'password' : 'text';
  document.getElementById('iconEyeOpen').classList.toggle('hidden', !showing);
  document.getElementById('iconEyeOff').classList.toggle('hidden', showing);
  passwordEl.focus();
});

// Clear errors on type
emailEl.addEventListener('input',    () => { emailEl.classList.remove('invalid');    emailErr.textContent = ''; hideAlert(); });
passwordEl.addEventListener('input', () => { passwordEl.classList.remove('invalid'); passErr.textContent = '';  hideAlert(); });

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideAlert();
  let ok = true;

  if (!emailEl.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)) {
    emailEl.classList.add('invalid');
    emailErr.textContent = 'Enter a valid email address.';
    ok = false;
  }
  if (!passwordEl.value) {
    passwordEl.classList.add('invalid');
    passErr.textContent = 'Password is required.';
    ok = false;
  }
  if (!ok) { showAlert('Please fix the errors above.', 'error'); return; }

  submitBtn.classList.add('loading');
  submitBtn.disabled = true;

  try {
    const res  = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        email:    emailEl.value.trim().toLowerCase(),
        password: passwordEl.value,
        remember: rememberEl.checked
      })
    });
    const data = await res.json();

    if (res.ok) {
      showAlert('Signed in! Redirecting…', 'success');
      setTimeout(() => { window.location.href = data.redirect || '/dashboard'; }, 800);
    } else {
      emailEl.classList.add('invalid');
      passwordEl.classList.add('invalid');
      showAlert(data.message || 'Invalid email or password.', 'error');
    }
  } catch {
    showAlert('Network error — check your connection.', 'error');
  } finally {
    submitBtn.classList.remove('loading');
    submitBtn.disabled = false;
  }
});
</script>
</body>
</html>
