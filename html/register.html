<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BookShelf — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/auth.css"/>
</head>
<body>
<div class="page">

  <aside class="panel-left" aria-hidden="true">
    <div class="spines-wrap" id="spinesWrap"></div>
    <div class="shelf-bar"></div>
    <figure class="shelf-quote">
      <blockquote>"Not all those who wander are lost — but a good book helps you find yourself."</blockquote>
      <figcaption>— Inspired by J.R.R. Tolkien</figcaption>
    </figure>
  </aside>

  <main class="panel-right">
    <div class="form-shell">

      <a href="/" class="logo">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="8" fill="#1a1410"/>
          <rect x="8"  y="8" width="8"  height="24" rx="2" fill="#c8793a"/>
          <rect x="18" y="8" width="6"  height="24" rx="2" fill="#e8d9c0" opacity=".9"/>
          <rect x="26" y="8" width="5"  height="24" rx="2" fill="#c8793a" opacity=".5"/>
        </svg>
        <span class="logo-text">Book<em>Shelf</em></span>
      </a>

      <h1>Start your journey</h1>
      <p class="subtitle">Create a free account and track every book you read.</p>

      <div class="alert hidden" id="alertBox" role="alert" aria-live="polite">
        <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="alertMsg"></span>
      </div>

      <form id="registerForm" novalidate>

        <div class="field-row">
          <div class="field">
            <label for="firstName">First name</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" id="firstName" name="firstName" placeholder="Jane" autocomplete="given-name" required/>
            </div>
            <span class="field-error" id="firstNameError"></span>
          </div>

          <div class="field">
            <label for="lastName">Last name</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" id="lastName" name="lastName" placeholder="Doe" autocomplete="family-name" required/>
            </div>
            <span class="field-error" id="lastNameError"></span>
          </div>
        </div>

        <div class="field">
          <label for="email">Email address</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required/>
          </div>
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" name="password" placeholder="Min. 8 characters" autocomplete="new-password" required/>
            <button type="button" class="toggle-pw" id="togglePw1" aria-label="Show password">
              <svg id="eye1open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eye1off" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password" autocomplete="new-password" required/>
            <button type="button" class="toggle-pw" id="togglePw2" aria-label="Show confirm password">
              <svg id="eye2open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eye2off" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="confirmError"></span>
        </div>

        <div class="field terms-field">
          <label class="check-label">
            <input type="checkbox" id="terms" name="terms" required/>
            <span class="check-box"></span>
            I agree to the <a href="/terms" class="link-amber" target="_blank">Terms of Service</a> and <a href="/privacy" class="link-amber" target="_blank">Privacy Policy</a>
          </label>
          <span class="field-error" id="termsError"></span>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          <span class="btn-spinner"></span>
          <span class="btn-label">Create account</span>
        </button>

        <div class="divider"><span>or</span></div>
        <p class="signup-row">Already have an account? <a href="login.html" class="link-amber">Sign in</a></p>
      </form>

    </div>
  </main>
</div>

<script>
(function buildSpines() {
  const wrap = document.getElementById('spinesWrap');
  if (!wrap) return;
  const colors  = ['#c8793a','#e8d9c0','#5a7a5c','#8b5e3c','#4a6a8a','#b8a06e','#7a5a8a','#3a6a5a'];
  const heights = [130,165,145,185,135,158,148,172,128,162];
  const widths  = [22,18,26,20,16,24,19,23];
  for (let i = 0; i < 28; i++) {
    const s = document.createElement('div');
    s.className = 'spine';
    s.style.cssText = `width:${widths[i%widths.length]}px;height:${heights[i%heights.length]}px;background:${colors[i%colors.length]};animation-delay:${(i*0.03).toFixed(2)}s`;
    wrap.appendChild(s);
  }
})();

const alertBox = document.getElementById('alertBox');
const alertMsg = document.getElementById('alertMsg');
function showAlert(msg, type) { alertBox.className = 'alert ' + type; alertMsg.textContent = msg; }
function hideAlert()          { alertBox.className = 'alert hidden'; }

function setErr(inputEl, errEl, msg) { inputEl.classList.add('invalid'); errEl.textContent = msg; }
function clrErr(inputEl, errEl)      { inputEl.classList.remove('invalid'); errEl.textContent = ''; }

// Eye toggles
function makeToggle(inputId, btnId, openId, offId) {
  document.getElementById(btnId).addEventListener('click', () => {
    const inp = document.getElementById(inputId);
    const showing = inp.type === 'text';
    inp.type = showing ? 'password' : 'text';
    document.getElementById(openId).classList.toggle('hidden', !showing);
    document.getElementById(offId).classList.toggle('hidden', showing);
    inp.focus();
  });
}
makeToggle('password','togglePw1','eye1open','eye1off');
makeToggle('confirmPassword','togglePw2','eye2open','eye2off');

// Password strength
const pwEl   = document.getElementById('password');
const fill   = document.getElementById('strengthFill');
const lbl    = document.getElementById('strengthLabel');
function calcStrength(pw) {
  let s = 0;
  if (pw.length >= 8) s++;
  if (pw.length >= 12) s++;
  if (/[A-Z]/.test(pw)) s++;
  if (/[0-9]/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  return s;
}
pwEl.addEventListener('input', () => {
  clrErr(pwEl, document.getElementById('passwordError'));
  hideAlert();
  const s = calcStrength(pwEl.value);
  const pct   = [0,20,40,60,80,100][s];
  const color = ['#e2e8f0','#f87171','#fb923c','#facc15','#4ade80','#22c55e'][s];
  const text  = ['','Weak','Fair','Good','Strong','Very strong'][s];
  fill.style.width = pct + '%';
  fill.style.background = color;
  lbl.textContent = text;
  lbl.style.color = color;
});

// Clear errors on type
['firstName','lastName','email','confirmPassword'].forEach(id => {
  const el  = document.getElementById(id);
  const err = document.getElementById(id.charAt(0).toUpperCase() + id.slice(1) + 'Error') ||
              document.getElementById(id + 'Error');
  if (el) el.addEventListener('input', () => { clrErr(el, err); hideAlert(); });
});

// Submit
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideAlert();

  const fn   = document.getElementById('firstName');
  const ln   = document.getElementById('lastName');
  const em   = document.getElementById('email');
  const pw   = document.getElementById('password');
  const cfm  = document.getElementById('confirmPassword');
  const trms = document.getElementById('terms');
  const btn  = document.getElementById('submitBtn');

  let ok = true;
  if (!fn.value.trim())  { setErr(fn,  document.getElementById('firstNameError'),  'First name is required.'); ok = false; }
  if (!ln.value.trim())  { setErr(ln,  document.getElementById('lastNameError'),   'Last name is required.');  ok = false; }
  if (!em.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em.value)) {
    setErr(em, document.getElementById('emailError'), 'Enter a valid email.'); ok = false;
  }
  if (pw.value.length < 8) {
    setErr(pw, document.getElementById('passwordError'), 'Password must be at least 8 characters.'); ok = false;
  }
  if (pw.value !== cfm.value) {
    setErr(cfm, document.getElementById('confirmError'), 'Passwords do not match.'); ok = false;
  }
  if (!trms.checked) {
    document.getElementById('termsError').textContent = 'You must agree to the terms.'; ok = false;
  }
  if (!ok) { showAlert('Please fix the errors above.', 'error'); return; }

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res  = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({
        firstName:       fn.value.trim(),
        lastName:        ln.value.trim(),
        email:           em.value.trim().toLowerCase(),
        password:        pw.value,
        confirmPassword: cfm.value
      })
    });
    const data = await res.json();

    if (res.ok) {
      showAlert('Account created! Redirecting…', 'success');
      setTimeout(() => { window.location.href = data.redirect || '/dashboard'; }, 900);
    } else {
      showAlert(data.message || 'Registration failed. Please try again.', 'error');
    }
  } catch {
    showAlert('Network error — check your connection.', 'error');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
});
</script>
</body>
</html>
