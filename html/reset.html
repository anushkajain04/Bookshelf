<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BookShelf — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/auth.css"/>
</head>
<body>
<div class="page">

  <aside class="panel-left" aria-hidden="true">
    <div class="spines-wrap" id="spinesWrap"></div>
    <div class="shelf-bar"></div>
    <figure class="shelf-quote">
      <blockquote>"Every chapter deserves a fresh start."</blockquote>
      <figcaption>— BookShelf</figcaption>
    </figure>
  </aside>

  <main class="panel-right">
    <div class="form-shell">

      <a href="/" class="logo">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="8" fill="#1a1410"/>
          <rect x="8"  y="8" width="8"  height="24" rx="2" fill="#c8793a"/>
          <rect x="18" y="8" width="6"  height="24" rx="2" fill="#e8d9c0" opacity=".9"/>
          <rect x="26" y="8" width="5"  height="24" rx="2" fill="#c8793a" opacity=".5"/>
        </svg>
        <span class="logo-text">Book<em>Shelf</em></span>
      </a>

      <h1>Set new password</h1>
      <p class="subtitle">Choose a strong password for your account.</p>

      <!-- Token invalid message (shown if URL token missing/expired) -->
      <div class="alert error hidden" id="tokenError" role="alert">
        <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>This reset link is invalid or has expired. <a href="forgot.html" class="link-amber">Request a new one.</a></span>
      </div>

      <div class="alert hidden" id="alertBox" role="alert" aria-live="polite">
        <svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="alertMsg"></span>
      </div>

      <form id="resetForm" novalidate>

        <div class="field" id="fieldPassword">
          <label for="password">New password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" name="password" placeholder="Min. 8 characters" autocomplete="new-password" required/>
            <button type="button" class="toggle-pw" id="togglePw1" aria-label="Show password">
              <svg id="eye1open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eye1off" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <span class="strength-label" id="strengthLabel"></span>
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="field" id="fieldConfirm">
          <label for="confirmPassword">Confirm new password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password" autocomplete="new-password" required/>
            <button type="button" class="toggle-pw" id="togglePw2" aria-label="Show password">
              <svg id="eye2open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eye2off" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="confirmError"></span>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          <span class="btn-spinner"></span>
          <span class="btn-label">Reset password</span>
        </button>
      </form>

    </div>
  </main>
</div>

<script>
(function buildSpines() {
  const wrap = document.getElementById('spinesWrap');
  if (!wrap) return;
  const colors  = ['#c8793a','#e8d9c0','#5a7a5c','#8b5e3c','#4a6a8a','#b8a06e','#7a5a8a','#3a6a5a'];
  const heights = [130,165,145,185,135,158,148,172,128,162];
  const widths  = [22,18,26,20,16,24,19,23];
  for (let i = 0; i < 28; i++) {
    const s = document.createElement('div');
    s.className = 'spine';
    s.style.cssText = `width:${widths[i%widths.length]}px;height:${heights[i%heights.length]}px;background:${colors[i%colors.length]};animation-delay:${(i*0.03).toFixed(2)}s`;
    wrap.appendChild(s);
  }
})();

// ── Read token from URL ───────────────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const token     = urlParams.get('token');

if (!token) {
  document.getElementById('tokenError').classList.remove('hidden');
  document.getElementById('resetForm').style.display = 'none';
}

// ── Eye toggles ───────────────────────────────────────────────────────────────
function makeToggle(inputId, btnId, openId, offId) {
  document.getElementById(btnId).addEventListener('click', () => {
    const inp = document.getElementById(inputId);
    const open = document.getElementById(openId);
    const off  = document.getElementById(offId);
    const showing = inp.type === 'text';
    inp.type = showing ? 'password' : 'text';
    open.classList.toggle('hidden', !showing);
    off.classList.toggle('hidden', showing);
    inp.focus();
  });
}
makeToggle('password',        'togglePw1', 'eye1open', 'eye1off');
makeToggle('confirmPassword', 'togglePw2', 'eye2open', 'eye2off');

// ── Password strength ─────────────────────────────────────────────────────────
const pwEl    = document.getElementById('password');
const fill    = document.getElementById('strengthFill');
const label   = document.getElementById('strengthLabel');
const pwErr   = document.getElementById('passwordError');
const cfmEl   = document.getElementById('confirmPassword');
const cfmErr  = document.getElementById('confirmError');
const btn     = document.getElementById('submitBtn');
const alertBox = document.getElementById('alertBox');
const alertMsg = document.getElementById('alertMsg');

function calcStrength(pw) {
  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  return score;
}

pwEl.addEventListener('input', () => {
  pwEl.classList.remove('invalid');
  pwErr.textContent = '';
  const s = calcStrength(pwEl.value);
  const pct   = [0, 20, 40, 60, 80, 100][s];
  const color = ['#e2e8f0','#f87171','#fb923c','#facc15','#4ade80','#22c55e'][s];
  const text  = ['','Weak','Fair','Good','Strong','Very strong'][s];
  fill.style.width      = pct + '%';
  fill.style.background = color;
  label.textContent     = text;
  label.style.color     = color;
});

cfmEl.addEventListener('input', () => {
  cfmEl.classList.remove('invalid');
  cfmErr.textContent = '';
  hideAlert();
});

function showAlert(msg, type) {
  alertBox.className = 'alert ' + type;
  alertMsg.textContent = msg;
}
function hideAlert() { alertBox.className = 'alert hidden'; }

// ── Submit ────────────────────────────────────────────────────────────────────
document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideAlert();
  let ok = true;

  if (!pwEl.value || pwEl.value.length < 8) {
    pwEl.classList.add('invalid');
    pwErr.textContent = 'Password must be at least 8 characters.';
    ok = false;
  }
  if (pwEl.value !== cfmEl.value) {
    cfmEl.classList.add('invalid');
    cfmErr.textContent = 'Passwords do not match.';
    ok = false;
  }
  if (!ok) return;

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res  = await fetch('/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token,
        password:        pwEl.value,
        confirmPassword: cfmEl.value
      })
    });
    const data = await res.json();

    if (res.ok) {
      showAlert('Password reset! Redirecting to login…', 'success');
      setTimeout(() => { window.location.href = data.redirect || '/login'; }, 1500);
    } else {
      showAlert(data.message || 'Something went wrong.', 'error');
    }
  } catch {
    showAlert('Network error — please try again.', 'error');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
});
</script>
</body>
</html>
